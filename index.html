<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Матрица бандлов | Подбор офферов</title>
  <style>
    :root {
      --bg-page: #f1eee8;
      --bg-card: #e4d7c1;
      --bg-white: #ffffff;
      --bg-result: #f1eee8;
      --text-primary: #333333;
      --text-secondary: #8d6040;
      --text-dark: #212121;
      --accent: #ffdd2d;
      --accent-hover: #ffe560;
      --border: #ddc7a4;
      --border-active: #b58b60;
      --success-bg: #bedd9a;
      --success-text: #73b077;
      --radius: 12px;
      --shadow: 0 4px 12px rgba(33, 33, 33, 0.08);
      --shadow-hover: 0 8px 24px rgba(33, 33, 33, 0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-page); color: var(--text-primary); line-height: 1.5; padding: 24px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    header { margin-bottom: 24px; }
    h1 { font-size: 28px; color: var(--text-dark); margin-bottom: 4px; }
    .subtitle { color: var(--text-secondary); font-size: 15px; }

    .industry-info {
      background: var(--bg-white); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px; margin-bottom: 24px; display: none;
    }
    .industry-info.active { display: block; }
    .industry-info h3 { font-size: 16px; color: var(--text-dark); margin-bottom: 8px; }
    .industry-info p { font-size: 14px; color: var(--text-secondary); line-height: 1.4; }

    .selectors { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
    .panel { background: var(--bg-white); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .panel h3 { font-size: 16px; margin-bottom: 12px; color: var(--text-dark); }
    
    select {
      width: 100%; padding: 10px 12px; border: 1px solid var(--border);
      border-radius: 8px; background: #fff; color: var(--text-primary);
      font-size: 15px; cursor: pointer;
    }
    select:focus { border-color: var(--border-active); outline: none; box-shadow: 0 0 0 3px rgba(181,139,96,0.2); }

    .checkbox-group { display: flex; flex-direction: column; gap: 8px; max-height: 200px; overflow-y: auto; }
    .checkbox-item { display: flex; align-items: center; gap: 10px; padding: 4px 0; }
    .checkbox-item input { width: 18px; height: 18px; accent-color: var(--success-text); cursor: pointer; flex-shrink: 0; }
    .checkbox-item .product-name { font-size: 15px; color: var(--text-primary); }
    .checkbox-item .product-link { 
      color: var(--border-active); text-decoration: none; font-weight: 500; font-size: 15px; margin-left: 4px;
    }
    .checkbox-item .product-link:hover { text-decoration: underline; }

    .bundles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .bundle-card {
      background: var(--bg-white); border-radius: var(--radius);
      padding: 16px; transition: all 0.2s ease; cursor: pointer; position: relative;
    }
    .bundle-card:hover { 
      transform: scale(1.02); 
      box-shadow: var(--shadow-hover);
      cursor: pointer;
    }
    .bundle-card.selected { 
      background: var(--bg-card); 
      box-shadow: var(--shadow);
    }
    
    .bundle-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .bundle-title { font-weight: 600; font-size: 16px; color: var(--text-dark); }
    .bundle-vendor { font-size: 13px; color: var(--text-secondary); }
    .bundle-script { font-size: 14px; margin: 8px 0 12px; min-height: 40px; }
    
    .card-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn { padding: 8px 14px; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; transition: 0.2s; }
    .btn-link { background: none; border: none; color: var(--border-active); padding: 8px 0; font-size: 13px; cursor: pointer; text-decoration: none; }
    .btn-link:hover { text-decoration: underline; }

    .result-area {
      background: var(--bg-white); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px; position: sticky; top: 20px;
    }
    .result-title { font-size: 14px; color: var(--text-secondary); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    .result-text { white-space: pre-line; font-size: 15px; color: var(--text-primary); margin-bottom: 16px; min-height: 40px; }
    .result-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn-copy { background: var(--accent); color: var(--text-dark); padding: 10px 20px; font-size: 14px; flex: 1; }
    .btn-copy:hover { background: var(--accent-hover); }
    .btn-copy:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-reset { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary); padding: 10px 20px; font-size: 14px; }
    .btn-reset:hover { background: #fff; border-color: var(--border-active); }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(33,33,33,0.6); backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center; z-index: 1000;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--bg-white); border: 1px solid var(--border);
      border-radius: 16px; padding: 24px; max-width: 500px; width: 90%; box-shadow: 0 8px 32px rgba(33,33,33,0.2);
    }
    .modal h3 { font-size: 20px; margin-bottom: 16px; color: var(--text-dark); }
    .modal-section { margin-bottom: 16px; }
    .modal-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; font-weight: 600; }
    .modal-text { font-size: 14px; color: var(--text-primary); }
    .modal-link { color: var(--border-active); text-decoration: none; font-weight: 500; }
    .modal-link:hover { text-decoration: underline; }
    .modal-close { position: absolute; top: 12px; right: 16px; background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-secondary); }

    .feedback-btn {
      position: fixed; bottom: 20px; right: 20px;
      background: var(--accent); color: var(--text-dark);
      border: none; border-radius: 50%; width: 50px; height: 50px;
      font-size: 20px; cursor: pointer; box-shadow: var(--shadow);
      display: flex; align-items: center; justify-content: center;
    }
    .feedback-btn:hover { background: var(--accent-hover); }

    @media (max-width: 768px) {
      .selectors { grid-template-columns: 1fr; }
      .bundles-grid { grid-template-columns: 1fr; }
      .result-area { position: static; }
      .card-actions { flex-direction: column; }
      .btn { width: 100%; }
      .result-actions { flex-direction: column; }
    }
  </style>
</head>

      { industry: ["Стройка"], name: "Расчетный счет", desc: "Бесплатное обслуживание до 2 месяцев", link: "https://www.tbank.ru/business/account/" },

      { industry: ["Стройка"], name: "Овернайт", desc: "Описание", link: "" },
      { industry: ["Стройка"], name: "Интернет-эквайринг", desc: "Описание", link: "" }
    ];

    const CONFIG = {
      INDUSTRY_DESCS: {
        "Независимый Еком": "Онлайн-продажи через собственный сайт или приложение. Клиент не зависит от маркетплейсов.",
        "Зависимый Еком": "Продажи через маркетплейсы (Ozon, Wildberries, Яндекс.Маркет) как основной канал.",
        "Розница": "Офлайн-точки продаж: магазины, салоны, кафе, сервисные центры.",
        "IT": "Разработка ПО, веб-студии, аутсорсинг, IT-консалтинг.",
        "Стройка": "Строительство, ремонт, производство стройматериалов."
      }
    };

    let selectedIndustry = "", selectedProducts = [], selectedBundleIds = [];
    let allBundles = BUNDLES_DATA;
    let allProducts = PRODUCTS_DATA;

    function getUniqueIndustries() {
      const inds = new Set();
      allBundles.forEach(d => d.industry.forEach(i => inds.add(i)));
      allProducts.forEach(d => d.industry.forEach(i => inds.add(i)));
      return Array.from(inds).sort();
    }

    function getProductsForIndustry(industry) {
      return allProducts.filter(p => p.industry.includes(industry)).map(p => p.name);
    }

    function getBundles(industry, products) {
      if (!industry) return [];
      return allBundles.filter(d => {
        const indMatch = d.industry.includes(industry);
        const prodMatch = products.length === 0 || products.includes(d.product);
        return indMatch && prodMatch;
      });
    }

    // 🎯 НОВАЯ ЛОГИКА ГЕНЕРАЦИИ ТЕКСТА
    function generateCombinedText(bundleIds) {
      if (bundleIds.length === 0) return '';
      const bundles = bundleIds.map(id => allBundles.find(b => b.id === id)).filter(Boolean);
      if (bundles.length === 0) return '';
      if (bundles.length === 1) return bundles[0].script;
      
      // Группируем по продукту
      const byProduct = {};
      bundles.forEach(b => {
        if (!byProduct[b.product]) byProduct[b.product] = [];
        byProduct[b.product].push(b);
      });
      
      const productEntries = Object.entries(byProduct);
      
      // Если выбран ОДИН продукт с несколькими офферами
      if (productEntries.length === 1) {
        const [product, list] = productEntries[0];
        const base = list[0].script.split(' и получи ')[0];
        const benefits = list.map(b => {
          const parts = b.script.split(' и получи ');
          return parts.length > 1 ? parts[1].replace(/[""]/g, '') : '';
        }).filter(Boolean);
        
        if (benefits.length === 2) {
          return `${base} и получи "${benefits[0]}" и "${benefits[1]}"`;
        } else if (benefits.length > 2) {
          const last = benefits.pop();
          return `${base} и получи "${benefits.join('", "')}" и "${last}"`;
        } else {
          return list[0].script;
        }
      }
      
      // Если выбраны РАЗНЫЕ продукты
      const parts = [];
      productEntries.forEach(([product, list]) => {
        if (list.length === 1) {
          const script = list[0].script;
          const action = script.includes('Открой') ? 'Открой' : 'Подключи';
          const benefit = script.split(' и получи ')[1] || '';
          parts.push({ product, action, benefit });
        } else {
          const base = list[0].script.split(' и получи ')[0];
          const benefits = list.map(b => {
            const p = b.script.split(' и получи ');
            return p.length > 1 ? p[1].replace(/[""]/g, '') : '';
          }).filter(Boolean);
          const benefitText = benefits.length > 1 
            ? `"${benefits.join('", "')}"` 
            : `"${benefits[0]}"`;
          parts.push({ product, action: base.includes('Открой') ? 'Открой' : 'Подключи', benefit: benefitText });
        }
      });
      
      if (parts.length === 2) {
        return `${parts[0].action} ${parts[0].product} и подключи ${parts[1].product} и получи ${parts[0].benefit} и ${parts[1].benefit}`.replace(/  +/g, ' ');
      } else if (parts.length > 2) {
        const first = parts[0];
        const middle = parts.slice(1, -1).map(p => `${p.product}`).join(', ');
        const last = parts[parts.length - 1];
        const benefits = parts.map(p => p.benefit).join(' и ');
        return `${first.action} ${first.product}, подключи ${middle} и ${last.product} и получи ${benefits}`.replace(/, подключи и /g, ', ').replace(/  +/g, ' ');
      }
      
      return bundles[0].script;
    }

    function renderIndustries() {
      const select = document.getElementById('industry-select');
      select.innerHTML = '<option value="">Выберите отрасль</option>';
      getUniqueIndustries().forEach(ind => {
        const opt = document.createElement('option');
        opt.value = ind; opt.textContent = ind;
        select.appendChild(opt);
      });
    }

    function renderProducts() {
      const container = document.getElementById('products-list');
      container.innerHTML = '';
      if (!selectedIndustry) {
        container.innerHTML = '<p style="color: var(--text-secondary); font-size: 14px;">Сначала выберите отрасль</p>';
        return;
      }
      const products = getProductsForIndustry(selectedIndustry);
      if (products.length === 0) {
        container.innerHTML = '<p style="color: var(--text-secondary); font-size: 14px;">Нет продуктов для этой отрасли</p>';
        return;
      }
      products.forEach(prodName => {
        const pInfo = allProducts.find(p => p.name === prodName);
        const div = document.createElement('div');
        div.className = 'checkbox-item';
        const nameHtml = pInfo?.link 
          ? `<a href="${pInfo.link}" target="_blank" class="product-link" onclick="event.stopPropagation()">${prodName} ↗</a>`
          : `<span class="product-name">${prodName}</span>`;
        div.innerHTML = `<input type="checkbox" value="${prodName}" ${selectedProducts.includes(prodName) ? 'checked' : ''}> ${nameHtml}`;
        const checkbox = div.querySelector('input');
        checkbox.addEventListener('change', (e) => {
          if (e.target.checked) {
            if (!selectedProducts.includes(prodName)) selectedProducts.push(prodName);
          } else {
            selectedProducts = selectedProducts.filter(p => p !== prodName);
            selectedBundleIds = selectedBundleIds.filter(id => {
              const b = allBundles.find(x => x.id === id);
              return b?.product !== prodName;
            });
          }
          renderBundles();
          updateResult();
        });
        container.appendChild(div);
      });
    }

    function renderBundles() {
      const grid = document.getElementById('bundles-grid');
      grid.innerHTML = '';
      if (!selectedIndustry) {
        grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); padding: 40px;">Выберите отрасль, чтобы увидеть доступные бандлы</p>';
        return;
      }
      const bundles = getBundles(selectedIndustry, selectedProducts);
      if (bundles.length === 0) {
        grid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); padding: 40px;">${selectedProducts.length > 0 ? 'Нет бандлов для выбранной комбинации' : 'Для этой отрасли пока нет партнёрских офферов'}</p>`;
        return;
      }
      bundles.forEach(b => {
        const isSelected = selectedBundleIds.includes(b.id);
        const card = document.createElement('div');
        card.className = `bundle-card ${isSelected ? 'selected' : ''}`;
        
        const header = document.createElement('div');
        header.className = 'bundle-header';
        header.innerHTML = `<div><div class="bundle-title">${b.product}</div><div class="bundle-vendor">${b.vendor}</div></div>`;
        
        const script = document.createElement('div');
        script.className = 'bundle-script';
        script.textContent = b.script;
        
        // Только ссылка на оффер (убрали кнопки Добавить/Подробнее)
        const actions = document.createElement('div');
        actions.className = 'card-actions';
        if (b.link) {
          const linkBtn = document.createElement('a');
          linkBtn.href = b.link;
          linkBtn.target = '_blank';
          linkBtn.className = 'btn-link';
          linkBtn.textContent = 'Открыть оффер ↗';
          linkBtn.addEventListener('click', (e) => e.stopPropagation());
          actions.appendChild(linkBtn);
        }
        
        card.appendChild(header);
        card.appendChild(script);
        if (actions.children.length > 0) card.appendChild(actions);
        
        // Клик по карточке переключает выбор
        card.addEventListener('click', (e) => {
          if (!e.target.closest('a')) {
            toggleBundle(b.id);
          }
        });
        
        grid.appendChild(card);
      });
    }

    function updateResult() {
      const textEl = document.getElementById('result-text');
      const btnEl = document.getElementById('copy-btn');
      const resetBtn = document.getElementById('reset-btn');
      const text = generateCombinedText(selectedBundleIds);
      
      if (!text) {
        textEl.textContent = 'Выберите бандлы, чтобы получить готовую формулировку';
        btnEl.disabled = true;
        resetBtn.style.display = 'none';
      } else {
        textEl.textContent = text;
        btnEl.disabled = false;
        resetBtn.style.display = 'block';
      }
    }

    function toggleBundle(bundleId) {
      if (selectedBundleIds.includes(bundleId)) {
        selectedBundleIds = selectedBundleIds.filter(id => id !== bundleId);
      } else {
        selectedBundleIds.push(bundleId);
      }
      renderBundles();
      updateResult();
    }

    function openModal(bundle) {
      document.getElementById('modal-title').textContent = `${bundle.product} + ${bundle.vendor}`;
      document.getElementById('modal-script').textContent = bundle.script;
      document.getElementById('modal-details').textContent = bundle.details || 'Детали не указаны';
      const linkEl = document.getElementById('modal-link');
      if (bundle.link) {
        linkEl.href = bundle.link;
        linkEl.style.display = 'inline';
      } else {
        linkEl.style.display = 'none';
      }
      document.getElementById('modal-overlay').classList.add('active');
    }

    function setupEventListeners() {
      document.getElementById('industry-select').addEventListener('change', (e) => {
        selectedIndustry = e.target.value;
        selectedProducts = [];
        selectedBundleIds = [];
        const infoEl = document.getElementById('industry-info');
        const descEl = document.getElementById('industry-desc');
        if (selectedIndustry && CONFIG.INDUSTRY_DESCS[selectedIndustry]) {
          descEl.textContent = CONFIG.INDUSTRY_DESCS[selectedIndustry];
          infoEl.classList.add('active');
        } else {
          infoEl.classList.remove('active');
        }
        renderProducts();
        renderBundles();
        updateResult();
      });
      
      document.getElementById('modal-close').addEventListener('click', () => {
        document.getElementById('modal-overlay').classList.remove('active');
      });
      document.getElementById('modal-overlay').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) {
          document.getElementById('modal-overlay').classList.remove('active');
        }
      });
      
      document.getElementById('copy-btn').addEventListener('click', async () => {
        const text = document.getElementById('result-text').textContent;
        try {
          await navigator.clipboard.writeText(text);
          const btn = document.getElementById('copy-btn');
          const original = btn.textContent;
          btn.textContent = '✅ Скопировано!';
          btn.style.background = 'var(--success-bg)';
          setTimeout(() => {
            btn.textContent = original;
            btn.style.background = '';
          }, 2000);
        } catch (err) {
          alert('Не удалось скопировать. Выделите текст вручную.');
        }
      });
      
      document.getElementById('reset-btn').addEventListener('click', () => {
        selectedBundleIds = [];
        renderBundles();
        updateResult();
      });
      
      document.getElementById('feedback-btn').addEventListener('click', () => {
        alert('Форма обратной связи. Напишите нам!');
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderIndustries();
      setupEventListeners();
      console.log("✓ Данные загружены:", allBundles.length, "бандлов,", allProducts.length, "продуктов");
    });
  </script>
