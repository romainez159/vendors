<!DOCTYPE html>
<html>
<head>
    <title>Банковские продукты</title>
    <style>
        .bundle-card { border: 1px solid #ddd; padding: 20px; margin: 10px; }
        .tag { background: #f0f0f0; padding: 4px 8px; margin: 2px; display: inline-block; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="bundles-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        let BUNDLES_DATA = [];
        
        // Функция для загрузки из Google Sheets через export URL
        async function loadFromGoogleSheets() {
            const SHEET_ID = '2PACX-1vQ6efI49YZlwvdIPdFpkwTVisWD9P63E3UJ9XkeWnmxtfXwJPBhjNGWerDmmixbV5aMadBQTjkw1UMq';
            // Убедитесь, что таблица опубликована: 
            // Файл → Поделиться → Опубликовать в интернете → Лист → CSV
            
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;
            
            try {
                const response = await fetch(url);
                const csvText = await response.text();
                
                // Парсим CSV
                const rows = csvText.split('\n');
                const headers = rows[0].split(',');
                
                for (let i = 1; i < rows.length; i++) {
                    const values = rows[i].split(',');
                    if (values.length >= headers.length) {
                        const bundle = {
                            ID: parseInt(values[0]),
                            industry: values[1] ? values[1].split(';') : [],
                            product: values[2],
                            offer: values[3],
                            short_desc: values[4],
                            benefit: values[5],
                            desc: values[6],
                            url_offer: values[7]
                        };
                        BUNDLES_DATA.push(bundle);
                    }
                }
                
                renderBundles();
            } catch (error) {
                console.error('Ошибка загрузки данных:', error);
            }
        }
        
        function renderBundles() {
            const container = document.getElementById('bundles-container');
            container.innerHTML = '';
            
            BUNDLES_DATA.forEach(bundle => {
                const card = document.createElement('div');
                card.className = 'bundle-card';
                card.innerHTML = `
                    <div class="industry-tags">
                        ${bundle.industry.map(ind => `<span class="tag">${ind}</span>`).join('')}
                    </div>
                    <h3>${bundle.product}</h3>
                    <p><strong>${bundle.vendor}</strong></p>
                    <p>${bundle.fullScript}</p>
                    <div class="benefit">${bundle.benefit}</div>
                    <button class="details-btn">Показать детали</button>
                    <div class="details hidden">${bundle.details}</div>
                    <a href="${bundle.link}" target="_blank">Перейти к офферу</a>
                `;
                
                // Добавляем обработчик для кнопки деталей
                const btn = card.querySelector('.details-btn');
                const details = card.querySelector('.details');
                btn.addEventListener('click', () => {
                    details.classList.toggle('hidden');
                });
                
                container.appendChild(card);
            });
        }
        
        // Загружаем данные при загрузке страницы
        loadFromGoogleSheets();
    </script>
</body>
</html>
